version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: n8n
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - source: postgres_password
        target: postgres_password
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    networks:
      - n8n_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.19.4
    environment:
      TZ: "America/Sao_Paulo"
      GENERIC_TIMEZONE: "America/Sao_Paulo"

      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"

      N8N_HOST: "n8n.cicloia.shop"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "https"

      N8N_EDITOR_BASE_URL: "https://n8n.cicloia.shop/"
      WEBHOOK_URL: "https://n8n.cicloia.shop/"

      N8N_PROXY_HOPS: "1"
      N8N_SECURE_COOKIE: "true"

      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/postgres_password
      DB_POSTGRESDB_SCHEMA: public
    secrets:
      - source: postgres_password
        target: postgres_password
      - source: n8n_encryption_key
        target: n8n_encryption_key
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - public
      - n8n_internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0
      labels:
        - traefik.enable=true
        - traefik.docker.network=public

        - traefik.http.routers.n8n.rule=Host(`n8n.cicloia.shop`)
        - traefik.http.routers.n8n.entrypoints=web
        - traefik.http.routers.n8n.service=n8n

        - traefik.http.services.n8n.loadbalancer.server.port=5678

volumes:
  n8n_postgres_data:
    name: n8n_postgres_data
  n8n_data:
    name: n8n_data

secrets:
  postgres_password:
    file: /opt/swarm/n8n/secrets/postgres_password.txt
  n8n_encryption_key:
    file: /opt/swarm/n8n/secrets/n8n_encryption_key.txt

networks:
  public:
    external: true
  n8n_internal:
    driver: overlay
